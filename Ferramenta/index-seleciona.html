<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10403b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AIDA.ON">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="apple-touch-icon" href="../img/pwa-icon-180.png">
    <title>AIDA - Selecionar Imagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../img/AIDABranco.ico">
</head>

<body>

    <div class="main-wrapper">

        <header class="top-header">
            <img src="../img/LogoBranca.png" alt="AIDA Logo" class="logo-aida">
        </header>

        <main class="center-stage">
            <section class="card-selecao">
                <p class="texto-instrucao">Selecione sua imagem...</p>

                <input type="file" id="inputFileBotao" accept="image/*" hidden>

                <button id="btnAcaoSelecionar" class="btn-estilizado">SELECIONAR</button>
            </section>
        </main>

    </div>

    <script src="../pwa-register.js"></script>
    <script src="script.js"></script>

</body>

</html>
