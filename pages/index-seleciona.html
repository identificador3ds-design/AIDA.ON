<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10403b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AIDA.ON">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="apple-touch-icon" href="../assets/images/pwa-icon-180.png">
    <title>AIDA - Selecionar Imagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style-ferramenta.css">
    <link rel="icon" id="favicon" type="image/png" href="../assets/images/AIDABranco.ico">
    <script>
        if (["localhost", "127.0.0.1"].includes(location.hostname) && "serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((reg) => reg.unregister()));
            if ("caches" in window) {
                caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)));
            }
        }
    </script>
</head>

<body>

    <div class="main-wrapper">

        <header class="top-header">
            <img src="../assets/images/LogoBranca.png" alt="AIDA Logo" class="logo-aida">
        </header>

        <main class="center-stage">
            <section class="card-selecao">
                <p class="texto-instrucao">Selecione sua imagem...</p>

                <input type="file" id="inputFileBotao" accept="image/*" hidden>

                <button type="button" id="btnAcaoSelecionar" class="btn-estilizado">SELECIONAR</button>
            </section>
        </main>

    </div>

    <script src="../scripts/script-cookie-consent.js"></script>
    <script src="../scripts/script-ferramenta.js?v=20260616-analise-2"></script>

</body>

</html>
