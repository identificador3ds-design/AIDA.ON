<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA.ON - Histórico de Análises</title>
    <link rel="icon" type="image/png" href="../img/AIDABranco.ico">
    <link rel="stylesheet" href="../shared-theme.css">
    <link rel="stylesheet" href="../Ferramenta-Analise/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="aida-shell analysis-page">
    <header class="page-header">
        <a href="../index.html" aria-label="Página inicial">
            <img src="../img/LogoBranca.png" alt="Logo AIDA.ON" class="brand-logo">
        </a>
        <a href="../Ferramenta/index-seleciona.html" class="top-link">Nova análise</a>
    </header>

    <main class="page-frame history-main">
        <section class="card-analise glass-panel history-panel">
            <div class="history-header">
                <div>
                    <span class="page-kicker">Evidências</span>
                    <h1 class="page-title">Histórico de análises</h1>
                    <p class="page-copy">Acompanhe as últimas imagens processadas e revise os resultados salvos.</p>
                </div>
                <button id="btnLimparHistorico" class="aida-button danger">Limpar registros</button>
            </div>

            <div id="listaHistorico" class="grid-historico">
                <div class="mensagem-vazia">Nenhuma análise encontrada no banco de dados.</div>
            </div>
        </section>
    </main>

    <div id="modalDetalhes" class="modal-overlay" style="display: none;">
        <div class="modal-shell glass-panel">
            <button class="btn-fechar-modal" type="button" aria-label="Fechar modal">&times;</button>
            <h3 id="modalTitulo">Evidência</h3>
            <img id="modalImgProcessada" src="" alt="Resultado da evidência">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
