<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDA | Acesso</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="../img/AIDABranco.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <a href="../index.html" class="back-link" aria-label="Voltar para a página inicial">
    <img src="./img/Vector 5.svg" alt="">
  </a>

  <main class="auth-card" data-auth-mode="signup">
    <section class="panel panel--brand">
      <div class="panel__content panel__content--brand">
        <img class="brand-logo" src="./img/Group 1.png" alt="Logo AIDA">
        <div class="brand-copy" data-copy-signin>
          <h1>Welcome Back!</h1>
          <p>To keep connected with us please login with your personal info</p>
          <button type="button" class="ghost-button" data-mode-target="signin">SIGN IN</button>
        </div>
        <div class="brand-copy" data-copy-signup>
          <h1>Hello, Friend!</h1>
          <p>Enter your personal details and start your journey with AIDA today</p>
          <button type="button" class="ghost-button" data-mode-target="signup">SIGN UP</button>
        </div>
      </div>
    </section>

    <section class="panel panel--form">
      <div class="panel__content panel__content--form">
        <section class="form-view form signin">
          <form id="loginForm" novalidate>
            <h2>Sign In</h2>

            <div class="social-row" aria-hidden="true">
              <span>f</span>
              <span>G+</span>
              <span>in</span>
            </div>

            <p class="subtitle">or use your email account:</p>

            <label class="input-wrap">
              <span class="input-icon">✉</span>
              <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" required>
            </label>

            <label class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
            </label>

            <button type="submit" class="primary-button">SIGN IN</button>

            <button type="button" class="switch-link" data-mode-target="signup">Create Account</button>
          </form>
        </section>

        <section class="form-view form signup active">
          <form id="registerForm" novalidate>
            <h2>Create Account</h2>

            <div class="social-row" aria-hidden="true">
              <span>f</span>
              <span>G+</span>
              <span>in</span>
            </div>

            <p class="subtitle">or use your email for registration:</p>

            <label class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="regName" placeholder="Name" autocomplete="name" required>
            </label>

            <label class="input-wrap">
              <span class="input-icon">✉</span>
              <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required>
            </label>

            <label class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="regPassword" placeholder="Password" autocomplete="new-password" required>
            </label>

            <button type="submit" class="primary-button">SIGN UP</button>

            <button type="button" class="switch-link" data-mode-target="signin">Already have an account?</button>
          </form>
        </section>
      </div>

      <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>

</html>
