<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil AIDA.ON</title>
  <link rel="icon" type="image/png" href="../assets/images/AIDABranco.ico">
  <link rel="stylesheet" href="../styles/style-shared-theme.css">
  <link rel="stylesheet" href="../styles/style-perfil.css">
</head>
<body class="aida-shell profile-page">
  <header class="page-header">
    <a href="../index.html" aria-label="Pagina inicial">
      <img src="../assets/images/LogoBranca.png" alt="Logo AIDA.ON" class="brand-logo">
    </a>
    <a href="./index-apresentacao.html" class="top-link">Voltar</a>
  </header>

  <main class="page-frame profile-main">
    <section class="profile-shell glass-panel">
      <div class="profile-hero">
        <div class="profile-summary">
          <div class="avatar">
            <img src="../assets/images/circle-user-regular-full.svg" alt="Avatar do usuario">
          </div>

          <div class="profile-text">
            <span class="page-kicker">Minha conta</span>
            <h1 id="nome-usuario" class="page-title">Usuario</h1>
            <p id="email-usuario" class="page-copy">usuarioaida@gmail.com</p>
          </div>
        </div>

        <div class="profile-chips">
          <span class="profile-chip">Conta ativa</span>
          <span class="profile-chip">Historico salvo</span>
          <span class="profile-chip">Acesso rapido</span>
        </div>
      </div>

      <div class="profile-grid">
        <aside class="profile-overview glass-card">
          <span class="profile-label">Acesso rapido</span>
        </aside>

        <div class="profile-actions">
          <a href="./index-apresentacao.html" class="profile-action glass-card">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M10 6L4 12L10 18" />
                <path d="M5 12H20" />
              </svg>
            </span>
            <strong>Voltar</strong>
          </a>

          <a href="./index-historico.html" class="profile-action glass-card">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 8V12L15 15" />
                <path d="M20 12A8 8 0 1 1 17.66 6.34" />
                <path d="M20 4V10H14" />
              </svg>
            </span>
            <strong>Historico</strong>
          </a>

          <a href="./index-seleciona.html" class="profile-action glass-card">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M11 5H6A2 2 0 0 0 4 7V18A2 2 0 0 0 6 20H18A2 2 0 0 0 20 18V13" />
                <path d="M18.5 3.5L20.5 5.5L12 14L9 15L10 12L18.5 3.5Z" />
              </svg>
            </span>
            <strong>Analisar</strong>
          </a>

          <a href="./index-login.html" class="profile-action glass-card logout-card" id="logout-link">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M15 17L20 12L15 7" />
                <path d="M20 12H9" />
                <path d="M11 20H6A2 2 0 0 1 4 18V6A2 2 0 0 1 6 4H11" />
              </svg>
            </span>
            <strong>Sair</strong>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="../scripts/script-perfil.js"></script>
</body>
</html>
