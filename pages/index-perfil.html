<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#10403b">
  <title>Perfil AIDA.ON</title>
  <link rel="icon" id="favicon" type="image/png" href="../assets/images/AIDABranco.ico">
  <link rel="stylesheet" href="../styles/style-shared-theme.css">
  <link rel="stylesheet" href="../styles/style-perfil.css">
</head>
<body class="aida-shell profile-page">
  <header class="page-header">
    <a href="../index.html" aria-label="Pagina inicial">
      <img src="../assets/images/LogoBranca.png" alt="Logo AIDA.ON" class="brand-logo">
    </a>
    <a href="./index-apresentacao.html" class="top-link">Voltar</a>
  </header>

  <main class="page-frame profile-main">
    <section class="profile-hero glass-panel" aria-labelledby="nome-usuario">
      <div class="profile-identity">
        <div class="avatar" aria-hidden="true">
          <img src="../assets/images/circle-user-regular-full.svg" alt="">
        </div>

        <div class="profile-text">
          <span class="page-kicker">Minha conta</span>
          <h1 id="nome-usuario" class="page-title">Usuario</h1>
          <p id="email-usuario" class="page-copy">usuarioaida@gmail.com</p>
        </div>
      </div>

      <div class="profile-status-list" aria-label="Resumo da conta">
        <div class="profile-stat">
          <span>Perfil</span>
          <strong id="profile-info-role">Usuario</strong>
        </div>
        <div class="profile-stat">
          <span>Analises</span>
          <strong id="profile-info-analyses">0</strong>
        </div>
      </div>
    </section>

    <section class="profile-layout">
      <section class="profile-details glass-card" aria-label="Informacoes do usuario">
        <div class="section-heading">
          <span class="section-tag">Dados</span>
          <h2>Informacoes do usuario</h2>
        </div>

        <div class="profile-info-card">
          <div class="profile-info-item">
            <span class="profile-info-label">Nome</span>
            <strong id="profile-info-name">Usuario</strong>
          </div>
          <div class="profile-info-item">
            <span class="profile-info-label">Email</span>
            <strong id="profile-info-email">usuarioaida@gmail.com</strong>
          </div>
        </div>
      </section>

      <section class="profile-actions-panel glass-card" aria-label="Acoes do perfil">
        <div class="section-heading">
          <span class="section-tag">Acoes</span>
          <h2>Acesso rapido</h2>
        </div>

        <div class="profile-actions">
          <button type="button" class="profile-action" id="edit-profile-button">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M11 5H6A2 2 0 0 0 4 7V18A2 2 0 0 0 6 20H18A2 2 0 0 0 20 18V13" />
                <path d="M18.5 3.5L20.5 5.5L12 14L9 15L10 12L18.5 3.5Z" />
              </svg>
            </span>
            <strong>Editar</strong>
          </button>

          <a href="./index-historico.html" class="profile-action">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 7V12L15 14.5" />
                <path d="M7.8 5.8A8 8 0 1 1 5 12" />
                <path d="M4 5V9H8" />
              </svg>
            </span>
            <strong>Historico</strong>
          </a>

          <a href="./index-seleciona.html" class="profile-action">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 5V19" />
                <path d="M5 12H19" />
              </svg>
            </span>
            <strong>Analisar</strong>
          </a>

          <a href="./index-apresentacao.html" class="profile-action profile-action-secondary">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M10 6L4 12L10 18" />
                <path d="M5 12H20" />
              </svg>
            </span>
            <strong>Voltar</strong>
          </a>

          <a href="./index-login.html?trocar_conta=1" class="profile-action switch-account-card" id="switch-account-link">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M16 3H21V8" />
                <path d="M21 3L14 10" />
                <path d="M8 21H3V16" />
                <path d="M3 21L10 14" />
                <path d="M7 7A5 5 0 0 1 15.5 4.5" />
                <path d="M17 17A5 5 0 0 1 8.5 19.5" />
              </svg>
            </span>
            <strong>Trocar conta</strong>
          </a>

          <a href="./index-login.html" class="profile-action logout-card" id="logout-link">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M15 17L20 12L15 7" />
                <path d="M20 12H9" />
                <path d="M11 20H6A2 2 0 0 1 4 18V6A2 2 0 0 1 6 4H11" />
              </svg>
            </span>
            <strong>Sair</strong>
          </a>
        </div>
      </section>
    </section>
  </main>

  <div class="profile-modal" id="profile-edit-modal" hidden>
    <div class="profile-modal-backdrop" data-close-profile-modal></div>
    <div class="profile-modal-dialog glass-panel" role="dialog" aria-modal="true" aria-labelledby="profile-edit-title">
      <button type="button" class="profile-modal-close" aria-label="Fechar edicao" data-close-profile-modal>&times;</button>
      <h2 id="profile-edit-title">Editar informacoes</h2>
      <form id="profile-edit-form" class="profile-edit-form">
        <label class="profile-edit-field">
          <span>Nome</span>
          <input type="text" id="edit-profile-name" name="name" maxlength="60" required>
        </label>
        <label class="profile-edit-field">
          <span>Email</span>
          <input type="email" id="edit-profile-email" name="email" maxlength="120" required>
        </label>
        <p class="profile-edit-feedback" id="profile-edit-feedback" hidden></p>
        <div class="profile-edit-actions">
          <button type="button" class="profile-action profile-action-secondary" data-close-profile-modal>Cancelar</button>
          <button type="submit" class="profile-action">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/script-perfil.js"></script>
</body>
</html>
