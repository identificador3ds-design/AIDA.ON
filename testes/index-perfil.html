<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil AIDA.ON</title>
  <link rel="icon" type="image/png" href="../img/AIDABranco.ico">
  <link rel="stylesheet" href="../shared-theme.css">
  <link rel="stylesheet" href="style-perfil.css">
</head>
<body class="aida-shell profile-page">
  <header class="page-header">
    <a href="../index.html" aria-label="Pagina inicial">
      <img src="../img/LogoBranca.png" alt="Logo AIDA.ON" class="brand-logo">
    </a>
    <a href="../Tela-apresentação/index-apresentação.html" class="top-link">Voltar</a>
  </header>

  <main class="page-frame profile-main">
    <section class="profile-shell glass-panel">
      <div class="profile-summary">
        <div class="avatar">
          <img src="../img/circle-user-regular-full.svg" alt="Avatar do usuario">
        </div>
        <div class="profile-text">
          <span class="page-kicker">Minha conta</span>
          <h1 id="nome-usuario" class="page-title">Usuario</h1>
          <p id="email-usuario" class="page-copy">usuarioaida@gmail.com</p>
        </div>
      </div>

      <div class="profile-actions">
        <a href="../Tela-apresentação/index-apresentação.html" class="profile-action glass-card">
          <strong>Apresentacao</strong>
          <span>Voltar para a pagina institucional</span>
        </a>

        <a href="../Histórico/index-historico.html" class="profile-action glass-card">
          <strong>Minhas imagens</strong>
          <span>Revisar o historico das analises salvas</span>
        </a>

        <a href="../Ferramenta/index-seleciona.html" class="profile-action glass-card">
          <strong>Nova analise</strong>
          <span>Selecionar outra imagem para verificacao</span>
        </a>

        <a href="../login/index-login.html" class="profile-action glass-card logout-card" id="logout-link">
          <strong>Sair</strong>
          <span>Encerrar a sessao atual</span>
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
