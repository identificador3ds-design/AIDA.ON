<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA - Histórico de Análises</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../img/AIDABranco.ico">    
    <link rel="stylesheet" href="../Ferramenta-Analise/style.css"> 
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="main-wrapper">
        <header class="top-header">
            <a href="../index.html"><img src="../img/LogoBranca.png" alt="AIDA Logo" class="logo-aida"></a>
        </header>

        <main class="center-stage" style="flex-direction: column; width: 100%;">
            
            <section class="card-analise" style="width: 1000px; max-width: 95%; flex-direction: column; gap: 30px; align-items: stretch; display: flex;">
                
                <div class="resultado-header" style="margin-bottom: 0; padding-bottom: 20px;">
                    <h2 class="titulo-resultado" style="color: #c5dddb; font-size: 2rem;">Histórico de Análises</h2>
                    <button id="btnLimparHistorico" class="btn-estilizado btn-secundario" style="width: auto; border-color: #ff4b4b; color: #ff4b4b;">Limpar Registros</button>
                </div>

                <div id="listaHistorico" class="grid-historico">
                    <div class="mensagem-vazia" style="color: #c5dddb; text-align: center; width: 100%; padding: 40px 0; grid-column: 1 / -1;">
                        Nenhuma análise encontrada no banco de dados local.
                    </div>
                </div>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="../Ferramenta/index-seleciona.html" class="ancora-botao">
                        <button class="btn-estilizado btn-primario" style="width: 300px;">← NOVA ANÁLISE</button>
                    </a>
                </div>

            </section>

        </main>
    </div>

    <div id="modalDetalhes" class="modal-overlay" style="display: none;">
        <div class="card-analise" style="width: 500px; flex-direction: column; position: relative;">
            <span class="btn-fechar-modal" style="position: absolute; top: 20px; right: 30px; font-size: 30px; cursor: pointer; color: #ff4b4b;">&times;</span>
            <h3 id="modalTitulo" style="color: #c5dddb; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Evidência</h3>
            <img id="modalImgProcessada" src="" style="width: 100%; border-radius: 15px; border: 2px solid #127369;">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
