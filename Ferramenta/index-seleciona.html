<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA - Selecionar Imagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../img/AIDABranco.ico">
</head>

<body>

    <div class="main-wrapper">

        <header class="top-header">
            <a href="../index.html"><img src="../img/LogoBranca.png" alt="AIDA Logo" class="logo-aida"></a>
        </header>

        <main class="center-stage">
            <section class="card-selecao">
                <p class="texto-instrucao">Selecione sua imagem...</p>

                <input type="file" id="inputFileBotao" accept="image/*" hidden>

                <button id="btnAcaoSelecionar" class="btn-estilizado">SELECIONAR</button>
            </section>
        </main>

    </div>

    <script src="script.js"></script>

</body>

</html>
